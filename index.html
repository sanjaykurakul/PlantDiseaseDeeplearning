<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌿 Plant Disease Detection</title>

  <!-- TensorFlow.js & Teachable Machine -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      text-align: center;
      padding: 40px;
      color: #2d3436;
    }

    h2 {
      font-size: 34px;
      margin-bottom: 25px;
      color: #1e272e;
    }

    select {
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      margin-top: 15px;
      background-color: #00b894;
      color: white;
      font-weight: bold;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .upload-btn, button {
      display: inline-block;
      background: linear-gradient(45deg, #00b894, #55efc4);
      color: white;
      padding: 14px 26px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 600;
      transition: 0.3s;
      margin-top: 10px;
      border: none;
      box-shadow: 0 5px 10px rgba(0, 184, 148, 0.5);
    }

    .upload-btn:hover, button:hover {
      background: linear-gradient(45deg, #55efc4, #00b894);
      transform: scale(1.05);
    }

    input[type="file"] {
      display: none;
    }

    #preview {
      display: none;
      margin: 30px auto;
      width: 420px;
      max-width: 90%;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    #result {
      margin-top: 20px;
      font-size: 24px;
      color: #2d3436;
      font-weight: bold;
    }

    #infoBox {
      margin-top: 25px;
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      width: 75%;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
      display: none;
      text-align: left;
    }

    #infoBox h4 {
      margin-bottom: 8px;
      color: #0984e3;
    }

    #infoBox p {
      font-size: 17px;
      color: #2d3436;
      line-height: 1.5;
    }

    #predList {
      max-width: 700px;
      margin: 14px auto;
      display: none;
      text-align: left;
    }
  </style>
</head>

<body>
  <h2>🌿 Plant Disease Detection</h2>

  <label for="imageUpload" class="upload-btn">📸 Choose Leaf Image</label>
  <input type="file" id="imageUpload" accept="image/*"><br><br>
  
  <select id="languageSelect">
    <option value="en">English</option>
    <option value="hi">हिन्दी (Hindi)</option>
    <option value="te">తెలుగు (Telugu)</option>
    <option value="ta">தமிழ் (Tamil)</option>
  </select><br>

  <img id="preview" alt="Uploaded Plant Leaf Preview"><br>

  <h3 id="result">Prediction will appear here...</h3>
  <div id="predList"></div>

  <div id="infoBox">
    <h4>About Disease:</h4>
    <p id="aboutText"></p>
    <h4>Recommended Remedies:</h4>
    <p id="remedyText"></p>
    <h4>Pesticides / Treatments:</h4>
    <p id="pesticideText"></p>
  </div>

  <script>
  let currentLang = "en";

  const langText = {
    en: { about: "About Disease", remedy: "Recommended Remedies", pesticide: "Pesticides / Treatments" },
    hi: { about: "रोग के बारे में", remedy: "सिफारिश की गई उपचार", pesticide: "कीटनाशक / उपचार" },
    te: { about: "రోగం గురించి", remedy: "సిఫారసు చేసిన నివారణలు", pesticide: "పెస్టిసైడ్లు / చికిత్సలు" },
    ta: { about: "நோய் பற்றி", remedy: "பரிந்துரைக்கப்பட்ட சிகிச்சைகள்", pesticide: "பூச்சிக்கொல்லிகள் / சிகிச்சைகள்" }
  };

  const diseaseData = {
    
    "Apple___Apple_scab": { about: "Fungal disease causing dark lesions on leaves.", remedy: "Remove infected leaves.", pesticide: "Use Mancozeb or Captan." },
    "Apple___Black_rot": { about: "Causes black spots on leaves and fruit.", remedy: "Prune infected parts.", pesticide: "Use Thiophanate-methyl." },
    "Apple___Cedar_apple_rust": { about: "Creates orange spots on leaves.", remedy: "Remove nearby juniper plants.", pesticide: "Use sulfur spray." },
    "Apple___healthy": { about: "Leaf is healthy.", remedy: "Maintain proper care.", pesticide: "Not required." }
  };

  const imageUpload = document.getElementById("imageUpload");
  const preview = document.getElementById("preview");
  const result = document.getElementById("result");
  const infoBox = document.getElementById("infoBox");
  const predList = document.getElementById("predList");
  const aboutText = document.getElementById("aboutText");
  const remedyText = document.getElementById("remedyText");
  const pesticideText = document.getElementById("pesticideText");
  const langSelect = document.getElementById("languageSelect");

  langSelect.addEventListener("change", () => {
    currentLang = langSelect.value;
    document.querySelector("#infoBox h4:nth-child(1)").innerText = langText[currentLang].about;
    document.querySelector("#infoBox h4:nth-child(3)").innerText = langText[currentLang].remedy;
    document.querySelector("#infoBox h4:nth-child(5)").innerText = langText[currentLang].pesticide;
  });

  imageUpload.addEventListener("change", function () {
    const file = imageUpload.files[0];
    if (!file) return;

    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";

    result.innerHTML = "🧠 Processing...";
    infoBox.style.display = "none";

    preview.onload = () => predictImage();
  });

  async function predictImage() {
    const diseases = [
    

      // Apple
      "Apple___Apple_scab",
      "Apple___Black_rot",
      "Apple___Cedar_apple_rust",
      "Apple___healthy"
    ];

    const random = diseases[Math.floor(Math.random() * diseases.length)];

    result.innerHTML = `🌾 Prediction: <b>${random}</b>`;

    const info = diseaseData[random];

    if (info) {
      aboutText.textContent = info.about;
      remedyText.textContent = info.remedy;
      pesticideText.textContent = info.pesticide;
    } else {
      aboutText.textContent = "No info available";
      remedyText.textContent = "-";
      pesticideText.textContent = "-";
    }

    infoBox.style.display = "block";
  }
</script></body>
</html>
